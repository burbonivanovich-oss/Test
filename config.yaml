# Telegram Channel Monitor — Configuration
#
# This bot monitors Telegram channels for keyword mentions and sends daily summaries.
#
# Setup:
#   1. Read SETUP_GUIDE.md for complete instructions
#   2. Set up Telethon authentication (QR-code, SMS Auto, or SMS Manual)
#   3. Save credentials to .env file
#   4. Run: python wordstat_bot.py --config config.yaml

# Channel monitoring — MAIN FEATURE
channel_monitor:
  enabled: true

  # List of 12 channels to monitor for "тс пиот" mentions
  # Each channel must be PUBLIC (accessible without private access)
  channels:
    - name: "РИА Новости"
      username: "@rian_ru"

    - name: "ТАСС"
      username: "@tass_agency"

    - name: "РБК"
      username: "@rbc_news"

    - name: "Коммерсант"
      username: "@kommersant"

    - name: "1C"
      username: "@1c_rus"

    - name: "InfoStart"
      username: "@infostart_news"

    - name: "СБИС"
      username: "@sbis_news"

    - name: "Честный знак"
      username: "@chestnyznak_official"

    - name: "АТОЛ"
      username: "@atol_online"

    - name: "МойСклад"
      username: "@moysklad_news"

    - name: "EcomCrew"
      username: "@ecomcrew"

    - name: "Habr"
      username: "@habr_com"

  # Keywords to search for in channel messages
  keywords:
    - "тс пиот"
    - "ТС ПИОТ"

  # Time window: look back N hours for mentions
  # 24-36 hours = last 1-1.5 days
  hours_lookback: 36

  # When to send the daily summary
  schedule:
    weekday: 1              # 0=Monday, 1=Tuesday, … 6=Sunday
    hour: 10                # 10:00 UTC
    minute: 0

  # Output format: How to display mentions in the summary
  # You'll get something like:
  #   📱 РИА Новости
  #   🔗 Ссылка: https://t.me/rian_ru/12345
  #   📝 Текст: На рынке растет спрос на ТС ПИОТ...
  #   🕐 Дата: 2024-03-23 10:30 UTC

# Wordstat API configuration (optional, can be disabled)
wordstat:
  oauth_token: ""
  base_url: "https://api.wordstat.yandex.net"
  data_ready_weekday: 3

# Telegram Bot configuration
telegram:
  bot_token: ""
  chat_id: ""

# For Wordstat analytics (optional)
schedule:
  weekday: 0
  hour: 7
  minute: 0

analytics: []

clusters:
  - name: "ТС ПИОТ — топ запросов"
    method: topRequests
    phrases:
      - "тс пиот"
    regions: []
    devices: ["all"]
