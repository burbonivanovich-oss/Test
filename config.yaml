# Wordstat → Telegram Bot Configuration
#
# Secrets are loaded from environment variables (recommended):
#   WORDSTAT_OAUTH_TOKEN, TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
#
# For local development, copy .env.example → .env and fill in values.
# On bothost.ru set these in the "Environment Variables" section of your bot settings.
# Values below are used only as fallback when env vars are not set.

# Schedule for daemon mode (bothost.ru / long-running process).
# weekday: 0=Monday, 1=Tuesday … 6=Sunday
# hour/minute: UTC time
schedule:
  weekday: 0   # Monday
  hour: 7
  minute: 0

wordstat:
  oauth_token: ""          # or set WORDSTAT_OAUTH_TOKEN env var
  base_url: "https://api.wordstat.yandex.net"
  # Wordstat weekly data is typically published Wed/Thu.
  # If today's weekday (0=Mon … 6=Sun) is less than this value,
  # the analytics summary shifts back one week to avoid empty rows.
  data_ready_weekday: 3    # 3 = Thursday

telegram:
  bot_token: ""            # or set TELEGRAM_BOT_TOKEN env var
  chat_id: ""              # or set TELEGRAM_CHAT_ID env var (numeric id, e.g. -1001234567890)

# Analytics summary — compared current week vs previous week across query groups.
# Each group aggregates total weekly counts for all its phrases.
analytics:
  - name: "Коммерческие запросы"
    phrases:
      - "купить"
      - "цена"
      - "заказать"
    regions: []        # empty = all regions
    devices: ["all"]

  - name: "Информационные запросы"
    phrases:
      - "как"
      - "что такое"
      - "зачем"
    regions: []
    devices: ["all"]

# Query clusters — each cluster produces one section in the Telegram summary.
# Supported methods per cluster: topRequests | dynamics
clusters:
  - name: "Яндекс (топ запросов)"
    method: topRequests
    phrases:
      - "яндекс"
      - "yandex"
    regions: [213]          # 213 = Moscow; omit for all regions
    devices: ["all"]

  - name: "Конкуренты (динамика)"
    method: dynamics
    phrases:
      - "google поиск"
      - "bing"
    period: monthly         # monthly | weekly | daily
    from_date: "2025-01-01" # first day of month for monthly
    to_date: "2025-02-28"   # last day of month for monthly
    regions: []             # empty = all regions
    devices: ["all"]

  - name: "SEO инструменты (регионы)"
    method: regions
    phrases:
      - "вордстат"
    region_type: "regions"  # cities | regions | all
    devices: ["all"]
