# Wordstat + Telegram Channel Monitor Bot Configuration
#
# Full-featured bot that:
#   1. Collects data from Yandex Wordstat API
#   2. Monitors Telegram channels for keyword mentions
#   3. Sends combined daily reports
#
# Credentials stored in environment variables (see .env or bothost.ru):
#   - WORDSTAT_OAUTH_TOKEN (for Wordstat API)
#   - TELEGRAM_BOT_TOKEN (for Telegram bot)
#   - TELEGRAM_CHAT_ID (where to send reports)
#   - TELETHON_API_ID, TELETHON_API_HASH, TELETHON_SESSION_STRING (for channel monitoring)

# ============================================================================
# FEATURE 1: WORDSTAT ANALYTICS
# ============================================================================

schedule:
  weekday: 0   # Monday
  hour: 7      # UTC → 12:00 GMT+5
  minute: 0

wordstat:
  oauth_token: ""          # or set WORDSTAT_OAUTH_TOKEN env var
  base_url: "https://api.wordstat.yandex.net"
  # Wordstat weekly data is typically published Wed/Thu.
  data_ready_weekday: 3    # 3 = Thursday

telegram:
  bot_token: ""            # or set TELEGRAM_BOT_TOKEN env var
  chat_id: ""              # or set TELEGRAM_CHAT_ID env var

# Analytics summary — compared current week vs previous week
analytics:
  - name: "Информационные запросы"
    phrases:
      - "модуль тс пиот"
      - "реестр тс пиот"
      - "тс пиот"
      - "тс пиот перенос"
      - "тс пиот честный знак что это"
    regions: []
    devices: ["all"]

  - name: "Коммерческие запросы"
    phrases:
      - "внедрение тс пиот"
      - "модуль тс пиот честный знак"
      - "настройка тс пиот"
      - "подключение к тс пиот"
      - "работа с тс пиот"
      - "тс пиот кабинет"
      - "тс пиот как установить"
      - "тс пиот кассы"
      - "тс пиот купить"
      - "тс пиот личный кабинет"
      - "тс пиот регистрация"
      - "тс пиот скачать"
      - "тс пиот стоимость"
      - "тс пиот цена"
      - "установка тс пиот"
    regions: []
    devices: ["all"]

  - name: "Брендовые (Контур Маркет)"
    phrases:
      - "тс пиот маркет"
      - "тс пиот Контур"
    regions: []
    devices: ["all"]

  - name: "Брендовые (конкуренты)"
    phrases:
      - "тс пиот 1с"
      - "тс пиот мой склад"
      - "тс пиот атол"
      - "тс пиот сбис"
    regions: []
    devices: ["all"]

# Query clusters — each produces one section in the report
clusters:
  - name: "ТС ПИОТ — топ запросов"
    method: topRequests
    phrases:
      - "тс пиот"
    regions: []
    devices: ["all"]

# ============================================================================
# FEATURE 2: TELEGRAM CHANNEL MONITORING
# ============================================================================
# Monitor Telegram channels for keyword mentions.
#
# Authentication (Telethon):
#   1. Run: python3 setup_session_auto.py <API_ID> <API_HASH> <PHONE>
#   2. Save TELETHON_SESSION_STRING to environment variables
#
# Or use SSH:
#   python3 setup_session_qr.py <API_ID> <API_HASH>

channel_monitor:
  enabled: true             # Set to false to disable channel monitoring

  # List of 12 channels to monitor
  channels:
    - name: "РИА Новости"
      username: "@rian_ru"

    - name: "ТАСС"
      username: "@tass_agency"

    - name: "РБК"
      username: "@rbc_news"

    - name: "Коммерсант"
      username: "@kommersant"

    - name: "1C"
      username: "@1c_rus"

    - name: "InfoStart"
      username: "@infostart_news"

    - name: "СБИС"
      username: "@sbis_news"

    - name: "Честный знак"
      username: "@chestnyznak_official"

    - name: "АТОЛ"
      username: "@atol_online"

    - name: "МойСклад"
      username: "@moysklad_news"

    - name: "EcomCrew"
      username: "@ecomcrew"

    - name: "Habr"
      username: "@habr_com"

  # Keywords to search for
  keywords:
    - "тс пиот"
    - "ТС ПИОТ"

  # Time window for scanning messages
  hours_lookback: 60

  # Schedule for channel summary digest
  schedule:
    weekday: 1              # 0=Monday, 1=Tuesday, … 6=Sunday
    hour: 5                 # UTC → 10:00 GMT+5
    minute: 0
